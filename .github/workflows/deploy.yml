name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # === Frontend CI ===
  frontend-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/bun.lock') }}-${{ hashFiles('frontend/src/**/*.js', 'frontend/src/**/*.jsx', 'frontend/src/**/*.ts', 'frontend/src/**/*.tsx', 'frontend/public/**/*', 'frontend/package.json', 'frontend/next.config.*', 'frontend/tsconfig.json', 'frontend/postcss.config.*', 'frontend/eslint.config.*', 'frontend/instrumentation-client.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  # === Backend CI ===
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v

  # === Check for Running Games (blocks backend deploy if games in progress) ===
  check-running-games:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check for running games
        run: |
          # If API is down, allow deploy (server might be crashed)
          RUNNING_GAMES=$(curl -sf https://api.lmdeceptionarena.averyyen.dev/api/games?status=running || echo "API_UNREACHABLE")

          if [ "$RUNNING_GAMES" = "API_UNREACHABLE" ]; then
            echo "API unreachable - allowing deploy (server may be down)"
            exit 0
          fi

          if [ "$RUNNING_GAMES" != "[]" ]; then
            echo "ERROR: Games are currently running. Cannot deploy backend."
            echo "Running games: $RUNNING_GAMES"
            exit 1
          fi

          echo "No games running. Safe to deploy."

  # === Deploy (only on push to main, after CI passes) ===
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, check-running-games]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        run: railway up --service backend -d
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend
        run: railway up --service frontend -d
        working-directory: frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
