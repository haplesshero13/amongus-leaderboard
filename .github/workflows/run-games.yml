name: Run Games

on:
  schedule:
    # Run 2 games every ~2.5 hours (5 runs/day = 10 games/day)
    - cron: "0 1,4,7,10,13 * * *"  # UTC: 1am, 4am, 7am, 10am, 1pm
  workflow_dispatch:
    inputs:
      games:
        description: "Number of games to run"
        required: true
        default: 5
        type: number

jobs:
  run-games:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev
        working-directory: backend

      - name: Run games
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GAME_COUNT: ${{ inputs.games || '2' }}
        run: |
          echo "Starting $GAME_COUNT game(s)..."
          source .venv/bin/activate
          python -m scripts.run_games --games "$GAME_COUNT" --yes
        working-directory: backend
