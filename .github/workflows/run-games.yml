name: Run Games

on:
  workflow_dispatch:
    inputs:
      games:
        description: 'Number of games to run'
        required: true
        default: '10'
        type: number

jobs:
  run-games:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run games
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Starting ${{ inputs.games }} game(s)..."
          python -m scripts.run_games --games ${{ inputs.games }} --yes
