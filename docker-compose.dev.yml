# Minimal docker-compose for local development
# Only runs infrastructure services (MinIO)
# Run backend and frontend locally with hot reload

services:
  # MinIO - S3-compatible object storage for game logs
  minio:
    image: minio/minio:latest
    container_name: amongus-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (access at http://localhost:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  minio_data:
